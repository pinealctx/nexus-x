repos:
  # ── 敏感信息扫描 ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── 通用文件检查 ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: forbid-submodules

  # ── Go ────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        files: ^(go\.mod|go\.sum|.*\.go)$

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        pass_filenames: false
        files: \.go$
